version: '3.8'

services:
  library-db:
    image: mysql:8.0
    container_name: library_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: library_db
    ports:
      - "3306:3306"
    volumes:
      # This tells Docker to automatically run your SQL file when the container first starts!
      - ./database:/docker-entrypoint-initdb.d