<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="login-container" class="module-container">
        <h2>Admin Login</h2>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <div id="dashboard-container" class="module-container" style="display: none;">
        <header>
            <h1>LMS Dashboard</h1>
            <button id="logout-btn">Logout</button>
        </header>
        
        <nav>
            <button onclick="showModule('dashboard')">Overview</button>
    
            <button onclick="showModule('books')">Manage Books</button>
            <button onclick="showModule('students')">Manage Students</button>
            <button onclick="showModule('issue')">Issue Book</button>
            <button onclick="showModule('return')">Return Book</button>
            <button onclick="showModule('reports')">Reports</button>
        </nav>

        <main id="dynamic-content">
            </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
